[build]
  publish = "."

[[redirects]]
  from = "/onpoint"
  to = "/onpoint.html"
  status = 200

[[redirects]]
  from = "/onpoint/scroll"
  to = "/onpoint.html?mode=scroll"
  status = 302

[[redirects]]
  from = "/onpoint/slide"
  to = "/onpoint.html?mode=slide"
  status = 302

[[redirects]]
  from = "/integrity/scroll"
  to = "/integrity.html?mode=scroll"
  status = 302

[[redirects]]
  from = "/fountainlife/scroll"
  to = "/fountainlife.html?mode=scroll"
  status = 302

[[redirects]]
  from = "/integrity"
  to = "/integrity.html"
  status = 200

[[redirects]]
  from = "/fountainlife"
  to = "/fountainlife.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/topgreener-roi"
  to = "/topgreener-roi.html"
  status = 200

[[redirects]]
  from = "/onpoint-roi"
  to = "/onpoint-roi.html"
  status = 200

[[redirects]]
  from = "/paragon-implant"
  to = "/paragon-implant.html"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/brandastic-seo"
  to = "/brandastic-seo-report.html"
  status = 200

[[redirects]]
  from = "/brandastic-seo-report"
  to = "/brandastic-seo-report.html"
  status = 200

[[redirects]]
  from = "/chpm-seo-monthly"
  to = "/chpm-seo-monthly.html"
  status = 200

[[redirects]]
  from = "/onboarding/*"
  to = "/onboarding.html?channel=:splat"
  status = 200

[[redirects]]
  from = "/dess-usa"
  to = "/dess-usa.html"
  status = 200

[[redirects]]
  from = "/dess"
  to = "/dess-usa.html"
  status = 200

[[redirects]]
  from = "/ai"
  to = "/ai.html"
  status = 200
